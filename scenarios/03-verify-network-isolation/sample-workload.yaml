# Sample workload for network isolation testing.
# Deploy in each tenant cluster to test ingress and inter-pod connectivity.
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-openshift
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-openshift
  template:
    metadata:
      labels:
        app: hello-openshift
    spec:
      containers:
        - name: hello
          image: registry.access.redhat.com/ubi9/httpd-24:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-openshift
  namespace: demo-app
spec:
  selector:
    app: hello-openshift
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: hello-openshift
  namespace: demo-app
spec:
  to:
    kind: Service
    name: hello-openshift
  port:
    targetPort: 8080
