# EgressFirewall -- Restrict outbound traffic for Tenant B workloads
#
# Apply INSIDE the Tenant B hosted cluster.
---
apiVersion: k8s.ovn.org/v1
kind: EgressFirewall
metadata:
  name: default
  namespace: customer-workloads
spec:
  egress:
    - type: Allow
      to:
        cidrSelector: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
    - type: Allow
      to:
        cidrSelector: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    - type: Deny
      to:
        cidrSelector: 0.0.0.0/0
