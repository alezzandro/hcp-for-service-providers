# NetworkAttachmentDefinition -- Tenant B OVN LocalNet (VLAN 301)
#
# Attach KubeVirt worker VMs to OVN-managed localnet with VLAN 301.
# See tenant-a/nad-vlan300.yaml for detailed explanation.
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: nad-vlan301
  namespace: clusters-tenant-b
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "tenant-b-physnet",
      "type": "ovn-k8s-cni-overlay",
      "topology": "localnet",
      "netAttachDefName": "clusters-tenant-b/nad-vlan301",
      "vlanID": 301,
      "subnets": "10.100.31.0/24",
      "excludeSubnets": "10.100.31.0/32,10.100.31.1/32,10.100.31.255/32",
      "mtu": 1500
    }
