# AdminNetworkPolicy -- Tenant VM Isolation on the Infrastructure Cluster
#
# Prevents cross-tenant traffic on the OVN primary overlay between tenant
# VM namespaces.  All tenant worker VMs share the infra cluster's OVN
# overlay; without this policy a pod in clusters-tenant-a can reach pods in
# clusters-tenant-b on overlay IPs (kubelet, node-exporter, etc.).
#
# The policy is split into two layers evaluated by priority:
#
#   Priority 9  -- Per-tenant "allow-tenant-X-internal" ANPs that permit
#                  same-namespace traffic.  Tenant clusters need cross-node
#                  GENEVE tunnels between their own virt-launcher pods for
#                  internal pod networking, so intra-namespace overlay traffic
#                  must remain open.
#
#   Priority 10 -- Generic "tenant-vm-isolation" ANP that denies all
#                  remaining inter-tenant traffic.  Platform namespaces (no
#                  "tenant" label) and external egress are explicitly allowed.
#
# Because priority 9 is evaluated before 10, same-namespace traffic hits the
# Allow before the Deny.  Cross-tenant traffic has no matching Allow at
# priority 9 and falls through to the Deny at priority 10.
#
# Note: ANP "sameLabels" is not used because OVN-Kubernetes expands it into
# a static address set covering ALL namespaces that carry the key, making it
# unable to distinguish same-tenant from cross-tenant traffic.  Per-tenant
# ANPs with explicit matchLabels are used instead.
#
# When onboarding a new tenant, add a corresponding "allow-tenant-X-internal"
# ANP (copy one of the blocks below, update the namespace name).

# ── Per-Tenant Allow (Priority 9) ─────────────────────────────────────────
---
apiVersion: policy.networking.k8s.io/v1alpha1
kind: AdminNetworkPolicy
metadata:
  name: allow-tenant-a-internal
spec:
  priority: 9
  subject:
    namespaces:
      matchLabels:
        kubernetes.io/metadata.name: clusters-tenant-a
  ingress:
    - name: allow-same-namespace
      action: Allow
      from:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: clusters-tenant-a
  egress:
    - name: allow-same-namespace
      action: Allow
      to:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: clusters-tenant-a
---
apiVersion: policy.networking.k8s.io/v1alpha1
kind: AdminNetworkPolicy
metadata:
  name: allow-tenant-b-internal
spec:
  priority: 9
  subject:
    namespaces:
      matchLabels:
        kubernetes.io/metadata.name: clusters-tenant-b
  ingress:
    - name: allow-same-namespace
      action: Allow
      from:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: clusters-tenant-b
  egress:
    - name: allow-same-namespace
      action: Allow
      to:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: clusters-tenant-b

# ── Cross-Tenant Deny (Priority 10) ───────────────────────────────────────
---
apiVersion: policy.networking.k8s.io/v1alpha1
kind: AdminNetworkPolicy
metadata:
  name: tenant-vm-isolation
spec:
  priority: 10
  subject:
    namespaces:
      matchExpressions:
        - key: tenant
          operator: Exists
  ingress:
    - name: allow-from-platform-namespaces
      action: Allow
      from:
        - namespaces:
            matchExpressions:
              - key: tenant
                operator: DoesNotExist
    - name: deny-from-tenant-namespaces
      action: Deny
      from:
        - namespaces:
            matchExpressions:
              - key: tenant
                operator: Exists
  egress:
    - name: allow-to-platform-namespaces
      action: Allow
      to:
        - namespaces:
            matchExpressions:
              - key: tenant
                operator: DoesNotExist
    - name: deny-to-tenant-namespaces
      action: Deny
      to:
        - namespaces:
            matchExpressions:
              - key: tenant
                operator: Exists
    - name: allow-external
      action: Allow
      to:
        - networks:
            - 0.0.0.0/0
    - name: pass-remaining
      action: Pass
      to:
        - networks:
            - 0.0.0.0/0
