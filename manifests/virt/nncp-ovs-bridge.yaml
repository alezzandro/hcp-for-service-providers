# NodeNetworkConfigurationPolicy -- OVS Bridge on Secondary NIC
#
# Creates an OVS bridge (br-secondary) with the secondary NIC as a port and
# declares OVN bridge-mappings for each tenant's localnet physnet.
#
# allow-extra-patch-ports: true is required so NMState tolerates OVN-managed
# patch/localnet ports that appear on the bridge after NADs are created.
# See: OCPBUGS-37542, KB 7116679, OCP 4.19+ secondary-networks docs.
#
# The placeholder __SECONDARY_NIC__ is replaced by 07-configure-secondary-network.sh
# with the actual detected NIC name (e.g., ens1 on m5.metal).
---
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: secondary-nic-ovs-bridge
spec:
  nodeSelector:
    node-role.kubernetes.io/master: ""
  desiredState:
    interfaces:
      - name: br-secondary
        type: ovs-bridge
        state: up
        bridge:
          allow-extra-patch-ports: true
          options:
            stp: false
          port:
            - name: __SECONDARY_NIC__
    ovn:
      bridge-mappings:
        - localnet: tenant-a-physnet
          bridge: br-secondary
          state: present
        - localnet: tenant-b-physnet
          bridge: br-secondary
          state: present
