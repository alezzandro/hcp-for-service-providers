# NodeNetworkConfigurationPolicy -- Tenant A VLAN 300 Bridge
#
# Creates a VLAN sub-interface and Linux bridge on the secondary NIC.
# The placeholder __SECONDARY_NIC__ is replaced by the setup script
# (07-configure-secondary-network.sh) with the actual detected NIC name.
---
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: tenant-a-vlan300-bridge
spec:
  nodeSelector:
    node-role.kubernetes.io/master: ""
  desiredState:
    interfaces:
      - name: __SECONDARY_NIC__.300
        type: vlan
        state: up
        vlan:
          base-iface: __SECONDARY_NIC__
          id: 300
        ipv4:
          enabled: false
        ipv6:
          enabled: false

      - name: br300
        type: linux-bridge
        state: up
        mtu: 1500
        bridge:
          options:
            stp:
              enabled: false
          port:
            - name: __SECONDARY_NIC__.300
        ipv4:
          enabled: false
        ipv6:
          enabled: false
