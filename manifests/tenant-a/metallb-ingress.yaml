# MetalLB Configuration for Tenant A Ingress
#
# Apply INSIDE the Tenant A hosted cluster after workers are Ready.
# Provides a dedicated ingress VIP on the tenant's VLAN.
---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    openshift.io/cluster-monitoring: "true"
  annotations:
    workload.openshift.io/allowed: management
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: metallb-operator-og
  namespace: metallb-system
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: metallb-operator
  namespace: metallb-system
spec:
  channel: "stable"
  name: metallb-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
---
apiVersion: metallb.io/v1beta1
kind: MetalLB
metadata:
  name: metallb
  namespace: metallb-system
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: tenant-a-ingress-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.100.30.100-10.100.30.100
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: tenant-a-l2adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - tenant-a-ingress-pool
---
apiVersion: v1
kind: Service
metadata:
  name: metallb-ingress
  namespace: openshift-ingress
  annotations:
    metallb.universe.tf/address-pool: tenant-a-ingress-pool
spec:
  type: LoadBalancer
  selector:
    ingresscontroller.operator.openshift.io/deployment-ingresscontroller: default
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443
